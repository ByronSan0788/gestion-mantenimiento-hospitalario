# Nombre de la aplicación Spring Boot
spring.application.name=backend

# URL de conexión a MySQL:
# - 127.0.0.1 es el servidor local
# - 3306 es el puerto por defecto de MySQL
# - gestion_mantenimiento_hospitalario es la base de datos que acabamos de crear
spring.datasource.url=jdbc:mysql://127.0.0.1:3306/gestion_mantenimiento_hospitalario

# Usuario de MySQL
spring.datasource.username=root

# Contraseña de MySQL
# Reemplaza TU_CONTRASENA por la contraseña real que tengas configurada
spring.datasource.password=123456

# Indica a Hibernate que actualice la estructura de tablas según las entidades Java
spring.jpa.hibernate.ddl-auto=update

# Muestra en consola las consultas SQL ejecutadas
spring.jpa.show-sql=true

# Formatea las consultas SQL para que se vean más ordenadas en consola
spring.jpa.properties.hibernate.format_sql=true

# Driver de conexión para MySQL
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver